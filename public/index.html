<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo-List App</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="output.css">
</head>
<body class="font-inter bg-[#f4f6f9] p-4 pb-8 text-gray-800">
    <header class="bg-white w-full p-8">
        <h1 class="text-3xl font-bold text-[#2563eb]">
            Todo-List App
        </h1>
    </header>

    <main class="flex my-4 gap-4">
        <aside class="p-8 w-[35%] h-fit  bg-white rounded-xl">
            <h3 class="text-xl font-bold mb-4 ">
                Tambahkan Aktivitas
            </h3>

            <form id="activity-form">
                <div class="input-activity flex flex-col mb-4 ">
                    <label for="input-activity" class="mb-2 ">Aktivitas</label>
                    <input type="text" id="input-activity" name="activity" placeholder="Masukkan aktivitas..." autocomplete="off" required class="bg-gray-50 p-4 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <div class="input-activity flex flex-col mb-4">
                    <label for="input-date" class="mb-2">Tanggal Harus Diselesaikan</label>
                    <input type="date" id="input-date" name="date" required class="bg-gray-50 p-4 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>

                <button id="add-activity" type="submit" class="bg-[#2563eb] text-white font-bold mt-4 p-4 w-[100%] rounded-xl hover:bg-blue-700">Tambah Aktivitas</button>
            </form>
        </aside>

        <div class="todos w-[65%] max-h-[100vh] overflow-y-auto scrollbar-thin scrollbar-thumb-blue-500 scrollbar-track-blue-100 ">
            <section class="bg-white p-8 mb-4 rounded-xl">
                <h3 class="text-xl font-bold mb-4 ">
                    Aktivitas Berlangsung
                </h3>

                <table class="w-[100%] ">
                    <thead>
                        <tr class="bg-gray-50">
                            <th class="text-left p-4">Aktivitas</th>
                            <th class="text-left p-4">Tanggal Harus Diselesaikan</th>
                            <th class="text-left p-4">Aksi</th>
                        </tr>
                    </thead>

                    <tbody id="task-progress"></tbody>
                </table>
            </section>

            <section class="bg-white p-8 rounded-xl h-">
                <h3 class="text-xl font-bold mb-4">
                    Aktivitas Selesai
                </h3>

                <table class="w-[100%] ">
                    <thead>
                        <tr class="bg-gray-50">
                            <th class="text-left p-4">Aktivitas</th>
                            <th class="text-left p-4">Tanggal Harus Diselesaikan</th>
                            <th class="text-left p-4">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="task-done"></tbody>
                </table>
            </section>
        </div>
    </main>
    <script src="app.js"></script>
</body>
</html>
